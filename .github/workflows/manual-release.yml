name: Manual release build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.1
        required: true
        default: 0.1.1
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        type: boolean
        default: true
      draft:
        description: Create or update a draft release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            args: --bundles nsis
            target: x86_64-pc-windows-msvc
            experimental: false

          - label: Windows ARM64
            runner: windows-11-arm
            args: --bundles nsis
            target: aarch64-pc-windows-msvc
            experimental: true

          - label: macOS x64
            runner: macos-15-intel
            args: --bundles app,dmg
            target: x86_64-apple-darwin
            experimental: false

          - label: macOS ARM64
            runner: macos-14
            args: --bundles app
            target: aarch64-apple-darwin
            experimental: false

          - label: Linux x64
            runner: ubuntu-24.04
            args: --bundles deb,appimage
            target: x86_64-unknown-linux-gnu
            experimental: false

          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            args: --bundles deb,appimage
            target: aarch64-unknown-linux-gnu
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        if: ${{ matrix.label != 'macOS ARM64' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Time Remind v${{ inputs.version }}
          releaseBody: |
            Manual preview build for Time Remind v${{ inputs.version }}.

            Windows is the current verified release platform.
            macOS and Linux assets are preview builds and require real-device validation.
            macOS ARM64 publishes a zipped .app bundle because DMG packaging is not stable on hosted ARM runners.
            Windows ARM64 and Linux ARM64 jobs use GitHub-hosted public-preview runners.
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          releaseAssetNamePattern: Time-Remind_${{ inputs.version }}_[platform]_[arch]_[bundle][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: Time-Remind_${{ inputs.version }}-[platform]-[arch]-[bundle]
          args: ${{ matrix.args }} --target ${{ matrix.target }}

      - name: Build macOS ARM64 app bundle
        if: ${{ matrix.label == 'macOS ARM64' }}
        run: pnpm tauri build ${{ matrix.args }} --target ${{ matrix.target }}

      - name: Package macOS ARM64 app bundle
        if: ${{ matrix.label == 'macOS ARM64' }}
        shell: bash
        run: |
          cd "src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ditto -c -k --sequesterRsrc --keepParent "Time Remind.app" "$GITHUB_WORKSPACE/Time-Remind_${{ inputs.version }}_macOS_aarch64_app.zip"

      - name: Upload macOS ARM64 workflow artifact
        if: ${{ matrix.label == 'macOS ARM64' }}
        uses: actions/upload-artifact@v4
        with:
          name: Time-Remind_${{ inputs.version }}-macos-aarch64-app
          path: Time-Remind_${{ inputs.version }}_macOS_aarch64_app.zip
          if-no-files-found: error

      - name: Ensure release exists
        if: ${{ matrix.label == 'macOS ARM64' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_flags=()
          if [ "${{ inputs.draft }}" = "true" ]; then
            release_flags+=(--draft)
          fi
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            release_flags+=(--prerelease)
          fi
          gh release view "v${{ inputs.version }}" >/dev/null 2>&1 || gh release create "v${{ inputs.version }}" \
            --title "Time Remind v${{ inputs.version }}" \
            --notes "Manual preview build for Time Remind v${{ inputs.version }}. Windows is the current verified release platform. macOS and Linux assets are preview builds and require real-device validation." \
            "${release_flags[@]}"

      - name: Upload macOS ARM64 app bundle asset
        if: ${{ matrix.label == 'macOS ARM64' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ inputs.version }}" "Time-Remind_${{ inputs.version }}_macOS_aarch64_app.zip" --clobber
