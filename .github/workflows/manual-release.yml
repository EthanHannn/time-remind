name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.1
        required: true
        default: 0.1.1
      prerelease:
        description: Mark the GitHub release as prerelease
        required: true
        type: boolean
        default: true
      draft:
        description: Create or update a draft release
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            args: --bundles nsis
            target: x86_64-pc-windows-msvc
            experimental: false

          - label: Windows ARM64
            runner: windows-11-arm
            args: --bundles nsis
            target: aarch64-pc-windows-msvc
            experimental: true

          - label: macOS x64
            runner: macos-15-intel
            args: --bundles app,dmg
            target: x86_64-apple-darwin
            experimental: false

          - label: macOS ARM64
            runner: macos-14
            args: --bundles app
            target: aarch64-apple-darwin
            experimental: false

          - label: Linux x64
            runner: ubuntu-24.04
            args: --bundles deb,appimage
            target: x86_64-unknown-linux-gnu
            experimental: false

          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            args: --bundles deb,appimage
            target: aarch64-unknown-linux-gnu
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            tag="v${{ github.event.inputs.version }}"
            draft="${{ github.event.inputs.draft }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          else
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            draft="false"
            prerelease="true"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Build and upload release asset
        if: ${{ matrix.label != 'macOS ARM64' }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: Time Remind ${{ steps.release.outputs.tag }}
          releaseBody: |
            Release build for Time Remind ${{ steps.release.outputs.tag }}.

            Windows is the current verified release platform.
            macOS and Linux packages are published as community preview assets and still require real-device validation.
            Non-Windows lock detection, fullscreen detection, tray behavior, and autostart must be treated as unverified until confirmed on real devices.
            Windows ARM64 and Linux ARM64 jobs use GitHub-hosted public-preview runners.
          releaseDraft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          releaseAssetNamePattern: Time-Remind_${{ steps.release.outputs.version }}_[platform]_[arch]_[bundle][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: Time-Remind_${{ steps.release.outputs.version }}-[platform]-[arch]-[bundle]
          args: ${{ matrix.args }} --target ${{ matrix.target }}

      - name: Build macOS ARM64 app bundle
        if: ${{ matrix.label == 'macOS ARM64' }}
        run: pnpm tauri build ${{ matrix.args }} --target ${{ matrix.target }}

      - name: Package macOS ARM64 app bundle
        if: ${{ matrix.label == 'macOS ARM64' }}
        shell: bash
        run: |
          cd "src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ditto -c -k --sequesterRsrc --keepParent "Time Remind.app" "$GITHUB_WORKSPACE/Time-Remind_${{ steps.release.outputs.version }}_macOS_aarch64_app.zip"

      - name: Upload macOS ARM64 workflow artifact
        if: ${{ matrix.label == 'macOS ARM64' }}
        uses: actions/upload-artifact@v4
        with:
          name: Time-Remind_${{ steps.release.outputs.version }}-macos-aarch64-app
          path: Time-Remind_${{ steps.release.outputs.version }}_macOS_aarch64_app.zip
          if-no-files-found: error

      - name: Ensure release exists
        if: ${{ matrix.label == 'macOS ARM64' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_flags=()
          if [ "${{ steps.release.outputs.draft }}" = "true" ]; then
            release_flags+=(--draft)
          fi
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            release_flags+=(--prerelease)
          fi

          gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1 || gh release create "${{ steps.release.outputs.tag }}" \
            --title "Time Remind ${{ steps.release.outputs.tag }}" \
            --notes "Release build for Time Remind ${{ steps.release.outputs.tag }}. Windows is verified. macOS and Linux packages are community preview assets and require real-device validation." \
            "${release_flags[@]}"

      - name: Upload macOS ARM64 app bundle asset
        if: ${{ matrix.label == 'macOS ARM64' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag }}" "Time-Remind_${{ steps.release.outputs.version }}_macOS_aarch64_app.zip" --clobber

  macos-arm64-dmg:
    name: macOS ARM64 DMG
    runs-on: macos-14
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            tag="v${{ github.event.inputs.version }}"
            draft="${{ github.event.inputs.draft }}"
            prerelease="${{ github.event.inputs.prerelease }}"
          else
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            draft="false"
            prerelease="true"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Build macOS ARM64 DMG with diagnostics
        id: build_dmg
        shell: bash
        run: |
          set +e
          pnpm tauri build --bundles dmg --target aarch64-apple-darwin 2>&1 | tee "$GITHUB_WORKSPACE/macos-arm64-dmg-build.log"
          status=${PIPESTATUS[0]}

          mkdir -p "$GITHUB_WORKSPACE/macos-arm64-dmg-diagnostics"
          cp "$GITHUB_WORKSPACE/macos-arm64-dmg-build.log" "$GITHUB_WORKSPACE/macos-arm64-dmg-diagnostics/build.log"
          if [ -d "src-tauri/target/aarch64-apple-darwin/release/bundle" ]; then
            find "src-tauri/target/aarch64-apple-darwin/release/bundle" -maxdepth 5 -print > "$GITHUB_WORKSPACE/macos-arm64-dmg-diagnostics/bundle-files.txt"
          fi
          if [ -d "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg" ]; then
            cp -R "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg" "$GITHUB_WORKSPACE/macos-arm64-dmg-diagnostics/dmg"
          fi

          exit "$status"

      - name: Upload macOS ARM64 DMG diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: Time-Remind_${{ steps.release.outputs.version }}-macos-aarch64-dmg-diagnostics
          path: macos-arm64-dmg-diagnostics
          if-no-files-found: error

      - name: Upload macOS ARM64 DMG workflow artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: Time-Remind_${{ steps.release.outputs.version }}-macos-aarch64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Ensure release exists
        if: ${{ success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_flags=()
          if [ "${{ steps.release.outputs.draft }}" = "true" ]; then
            release_flags+=(--draft)
          fi
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            release_flags+=(--prerelease)
          fi

          gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1 || gh release create "${{ steps.release.outputs.tag }}" \
            --title "Time Remind ${{ steps.release.outputs.tag }}" \
            --notes "Release build for Time Remind ${{ steps.release.outputs.tag }}. Windows is verified. macOS and Linux packages are community preview assets and require real-device validation." \
            "${release_flags[@]}"

      - name: Upload macOS ARM64 DMG release asset
        if: ${{ success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag }}" src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg --clobber
